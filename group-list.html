<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>已發起的球局 | BAPLCP 排球報名系統</title>
  <meta name="description" content="BAPLCP 已發起的球局，查看進行中與已結束的排球活動。">
  <link rel="icon" type="image/png" sizes="1024x1024" href="./images/favicon.png?v=20260415">
  <link rel="shortcut icon" href="./images/favicon.png?v=20260415">
  <link rel="apple-touch-icon" href="./images/favicon.png?v=20260415">
  <style>
    :root {
      --primary: #5768ff;
      --text: #101840;
      --muted: #696f8c;
      --muted-soft: #8f95b2;
      --line: #f4f6fa;
      --surface: #ffffff;
      --soft: #eff1fe;
      --success-bg: #eefafa;
      --success: #1bc4be;
      --shadow: 0 24px 64px rgba(30, 42, 110, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(87, 104, 255, 0.14), transparent 32%),
        linear-gradient(180deg, #f5f6fb 0%, #edf0f8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: 0;
      padding: 0;
      background: none;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .app-shell {
      width: min(100%, 390px);
      height: min(844px, calc(100vh - 48px));
      background: var(--surface);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
    }

    .app-scroll {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 22px;
    }

    .app-scroll::-webkit-scrollbar {
      display: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 60px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid rgba(16, 24, 64, 0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .icon-button {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      color: #667095;
      flex: 0 0 auto;
    }

    .brand {
      width: 65px;
      height: 22px;
      background: url("./images/logo-purple.svg") center/contain no-repeat;
      flex: 0 0 auto;
    }

    .topbar-title {
      flex: 1;
      text-align: center;
      font-size: 16px;
      color: transparent;
      user-select: none;
    }

    .page {
      padding: 31px 16px 0;
    }

    .page-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.36;
      letter-spacing: 0.48px;
      font-weight: 700;
      color: var(--text);
    }

    .section-title {
      margin: 22px 0 12px;
      font-size: 18px;
      line-height: 1.36;
      letter-spacing: 0.36px;
      font-weight: 700;
      color: var(--text);
    }

    .active-card {
      min-height: 92px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      background: var(--soft);
    }

    .active-count {
      width: 64px;
      height: 68px;
      border-radius: 9px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .active-count-label {
      font-size: 12px;
      line-height: 1.25;
      font-weight: 500;
      color: var(--muted);
    }

    .active-count-value {
      margin-top: 1px;
      font-size: 32px;
      line-height: 1.25;
      font-weight: 500;
      color: var(--primary);
    }

    .event-content {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .event-date {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 500;
      color: var(--primary);
      white-space: nowrap;
    }

    .event-date .divider {
      color: var(--muted-soft);
    }

    .event-location {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .go-button {
      min-width: 64px;
      min-height: 44px;
      border-radius: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 17px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 600;
      flex: 0 0 auto;
    }

    .history-title {
      margin-top: 37px;
      margin-bottom: 0;
    }

    .history-list {
      margin-top: 0;
    }

    .history-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .history-row .event-location {
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .badge-success {
      background: var(--success-bg);
      color: var(--success);
    }

    .badge-muted {
      background: var(--line);
      color: var(--muted-soft);
    }

    .chevron {
      width: 24px;
      height: 24px;
      color: #696f8c;
      flex: 0 0 auto;
    }

    .menu-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      pointer-events: none;
    }

    .menu-overlay.is-open {
      pointer-events: auto;
    }

    .menu-backdrop {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .menu-overlay.is-open .menu-backdrop {
      opacity: 1;
    }

    .side-menu {
      position: absolute;
      top: 0;
      right: 0;
      width: min(329px, calc(100% - 61px));
      height: 100%;
      padding: 32px 0;
      background: #fff;
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .side-menu::-webkit-scrollbar {
      display: none;
    }

    .menu-overlay.is-open .side-menu {
      transform: translateX(0);
    }

    .drawer-profile {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px 28px;
    }

    .drawer-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .drawer-user-stack {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .drawer-user {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 500;
      color: #101840;
    }

    .drawer-role {
      width: max-content;
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 4px 6px;
      border: 1px solid rgba(217, 141, 53, 0.3);
      border-radius: 6px;
      background: rgba(248, 222, 183, 0.2);
      color: #c79051;
      font-size: 12px;
      line-height: 1.4;
      font-weight: 400;
      white-space: nowrap;
    }

    .drawer-role svg {
      display: block;
      width: 13px;
      height: 13px;
      flex: 0 0 auto;
      color: #e6b883;
    }

    .drawer-close {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      color: #474d66;
      align-self: flex-start;
      margin-top: 12px;
      flex: 0 0 auto;
    }

    .drawer-content {
      display: grid;
      gap: 23px;
      flex: 1;
      padding-bottom: 32px;
    }

    .drawer-section {
      padding: 0 32px 0 16px;
    }

    .drawer-section-title {
      margin: 0 0 16px;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 400;
      color: #8f95b2;
    }

    .drawer-list {
      display: grid;
      gap: 20px;
    }

    .drawer-link {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 36px;
      color: #101840;
      text-decoration: none;
      font-size: 16px;
      line-height: 1.4;
    }

    .drawer-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: #a8b1f4;
      color: #8f95b2;
      overflow: hidden;
    }

    .drawer-icon img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: drop-shadow(3.2px 3.2px 12px rgba(87, 104, 255, 0.55));
    }

    .drawer-icon.is-warm {
      background: #f2b57c;
    }

    .drawer-icon.is-warm img {
      filter: drop-shadow(3.8px 3.8px 14px rgba(148, 77, 27, 0.45));
    }

    .drawer-icon.is-muted {
      background: #edeff5;
    }

    .drawer-divider {
      height: 1px;
      background: #edeff5;
    }

    .drawer-footer {
      margin-top: auto;
      padding: 0 16px;
    }

    .drawer-create-button {
      width: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #61c7c4;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 500;
    }

    @media (max-width: 380px) {
      .side-menu {
        width: 84vw;
      }

      .drawer-section {
        padding-right: 24px;
      }
    }

    @media (max-width: 500px) {
      body {
        display: block;
        padding: 0;
        background: #fff;
      }

      .app-shell {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="app-scroll">
      <header class="topbar">
        <button class="icon-button" id="back-button" type="button" aria-label="返回上一頁">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <a class="brand" href="./index.html" aria-label="回到首頁 BAPLCP"></a>
        <div class="topbar-title" aria-hidden="true">華江高中臨打報名</div>
        <button class="icon-button" type="button" aria-label="開啟選單">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M4 12H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M4 17H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <section class="page">
        <h1 class="page-title">已發起的球局</h1>

        <h2 class="section-title">進行中</h2>
        <article class="active-card">
          <div class="active-count" aria-label="臨打缺 9 人">
            <span class="active-count-label">臨打缺</span>
            <span class="active-count-value">9</span>
          </div>
          <div class="event-content">
            <p class="event-date">4.09 (日)<span class="divider">｜</span>8:00-11:00</p>
            <p class="event-location">板橋柏吉倫排球場</p>
          </div>
          <a class="go-button" href="./active-activity.html">前往</a>
        </article>

        <h2 class="section-title history-title">已結束</h2>
        <div class="history-list" aria-label="已結束">
          <a class="history-row" href="./ended-activity.html">
            <div class="event-content">
              <p class="event-date">4.02 (日)</p>
              <p class="event-location">板橋柏吉倫排球場</p>
            </div>
            <span class="badge badge-success">已參加</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>

          <a class="history-row" href="./ended-activity.html">
            <div class="event-content">
              <p class="event-date">3.28 (日)</p>
              <p class="event-location">板橋柏吉倫排球場</p>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>

          <a class="history-row" href="./ended-activity.html">
            <div class="event-content">
              <p class="event-date">3.21 (日)</p>
              <p class="event-location">板橋柏吉倫排球場</p>
            </div>
            <span class="badge badge-muted">已請假</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>

          <a class="history-row" href="./ended-activity.html">
            <div class="event-content">
              <p class="event-date">3.14 (日)</p>
              <p class="event-location">板橋柏吉倫排球場</p>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>

          <a class="history-row" href="./ended-activity.html">
            <div class="event-content">
              <p class="event-date">3.07(日)</p>
              <p class="event-location">板橋柏吉倫排球場</p>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </section>
    </div>
  </main>

  <script src="./menu-drawer.js"></script>
  <script>
    var backButton = document.getElementById("back-button");

    if (backButton) {
      backButton.addEventListener("click", function () {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }

        window.location.href = "./index.html";
      });
    }
  </script>
</body>
</html>

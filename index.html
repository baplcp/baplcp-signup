<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAPLCP 排球報名系統 V2</title>
  <meta name="description" content="BAPLCP 排球報名系統 V2 版，提供更直接的臨打名額與名單檢視。">
  <link rel="icon" type="image/png" sizes="1024x1024" href="./images/favicon.png?v=20260415">
  <link rel="shortcut icon" href="./images/favicon.png?v=20260415">
  <link rel="apple-touch-icon" href="./images/favicon.png?v=20260415">
  <style>
    :root {
      --bg: #eef1ff;
      --surface: #ffffff;
      --hero-start: #5768ff;
      --hero-end: #7685ff;
      --text: #18204f;
      --muted: #8a91b0;
      --accent: #ffd49d;
      --accent-text: #7f5a3e;
      --line: #edf0fb;
      --shadow: 0 24px 60px rgba(71, 82, 163, 0.18);
      --card-shadow: 2px 2px 28px rgba(90, 90, 226, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(87, 104, 255, 0.16), transparent 28%),
        linear-gradient(180deg, #f5f7ff 0%, #eef1ff 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      overflow: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      font: inherit;
      border: 0;
      padding: 0;
      background: none;
      cursor: pointer;
    }

    .app-shell {
      width: min(100%, 390px);
      height: min(844px, calc(100vh - 48px));
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .app-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .app-scroll::-webkit-scrollbar {
      display: none;
    }

    .scroll-content {
      min-height: 100%;
      background:
        linear-gradient(
          180deg,
          #5768ff 0%,
          #6373ff 7%,
          #7d8af9 13%,
          #c1c6f1 20%,
          #e8e9f5 27%,
          #fff 35%,
          #fff 100%
        );
    }

    .hero {
      position: relative;
      background: transparent;
      padding: 56px 19px 92px;
      min-height: 279px;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: none;
      pointer-events: none;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 19px;
      margin: 0 0 -48px;
      min-height: 48px;
      background: rgba(255, 255, 255, var(--nav-bg-opacity, 0));
      backdrop-filter: blur(calc(var(--nav-progress, 0) * 14px));
      -webkit-backdrop-filter: blur(calc(var(--nav-progress, 0) * 14px));
      box-shadow: 0 1px 0 rgba(16, 24, 64, calc(var(--nav-progress, 0) * 0.08));
    }

    .brand {
      width: 65px;
      height: 22px;
      background: url("https://www.figma.com/api/mcp/asset/5a247016-db50-433e-b855-443d6b2e0a8a") center/contain no-repeat;
      flex: 0 0 auto;
      transition: filter 0.25s ease;
    }

    .nav-title {
      flex: 1;
      opacity: 0;
      font-size: 15px;
      color: #fff;
      text-align: center;
    }

    .menu-btn {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .menu-btn img {
      width: 24px;
      height: 24px;
      transition: filter 0.25s ease;
    }

    .nav.is-scrolled {
      background: rgba(255, 255, 255, var(--nav-bg-opacity, 0.94));
    }

    .nav.is-scrolled .brand,
    .nav.is-scrolled .menu-btn img {
      filter: brightness(0) saturate(100%) invert(21%) sepia(27%) saturate(1897%) hue-rotate(210deg) brightness(93%) contrast(96%);
    }

    .hero-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 161px 178px;
      align-items: center;
      gap: 3px;
      margin-top: 3px;
    }

    .hero-cat {
      position: relative;
      height: 175px;
    }

    .hero-cat img {
      position: absolute;
      left: -10px;
      top: -8px;
      width: 185px;
      height: auto;
      filter: drop-shadow(-8px 9px 22.9px rgba(16, 24, 67, 0.45));
    }

    .hero-copy {
      color: #fff;
      padding-top: 0;
      transform: translateY(-22px);
      text-align: center;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.36;
      font-weight: 700;
      letter-spacing: 0.56px;
    }

    .hero-copy p {
      margin: 6px 0 0;
      font-size: 16px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.92);
      white-space: nowrap;
    }

    .summary-card {
      position: relative;
      z-index: 2;
      margin: -142px 19px 0;
      min-height: 107px;
      padding: 16px 16px 0;
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .summary-main {
      display: flex;
      align-items: center;
      gap: 17px;
      padding-bottom: 16px;
    }

    .summary-vacancy {
      width: 70px;
      min-height: 70px;
      flex: 0 0 auto;
      border-radius: 9px;
      background: rgba(220, 245, 245, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      text-align: center;
    }

    .summary-vacancy-label {
      margin: 0;
      font-size: 13px;
      line-height: 1.25;
      font-weight: 400;
      color: #474d66;
    }

    .summary-vacancy-value {
      margin: 0;
      font-size: 34px;
      line-height: 1.25;
      font-weight: 700;
      color: #17acba;
    }

    .summary-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .summary-time {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
      color: #474d66;
      white-space: nowrap;
    }

    .summary-date {
      letter-spacing: 0;
      font-kerning: normal;
      font-feature-settings: "kern";
      margin-right: -2px;
    }

    .summary-weekday {
      display: inline-block;
      transform: translateX(-4px);
    }

    .summary-separator {
      color: #d8dae5;
      font-weight: 700;
      margin: 0 10px 0 0;
    }

    .summary-location {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 400;
      color: #696f8c;
      opacity: 0.85;
      white-space: nowrap;
    }

    .summary-status {
      margin: 0 -16px;
      padding: 13px 16px 14px;
      border-top: 1px solid #edf0fb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .summary-status-text {
      margin: 0;
      min-width: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 400;
      color: #474d66;
      white-space: nowrap;
    }

    .summary-status-value {
      color: #17acba;
      font-weight: 500;
    }

    .leave-button {
      min-width: 0;
      min-height: 0;
      padding: 7px 14px;
      border: 1px solid #e3e6ef;
      border-radius: 999px;
      background: #fff;
      color: #474d66;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 400;
    }

    .content {
      padding: 24px 18px 110px;
    }

    .segment-tabs {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
    }

    .segment-tab {
      min-width: 56px;
      min-height: 34px;
      padding: 6px 17px;
      border-radius: 999px;
      background: #edeff5;
      color: #8d94ad;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .segment-tab.is-active {
      background: var(--hero-start);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(87, 104, 255, 0.22);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 2px;
    }

    .rank {
      width: 18px;
      flex: 0 0 auto;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--hero-start);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      background: linear-gradient(135deg, #8aa0ff 0%, #5768ff 100%);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .status-tag {
      flex: 0 0 auto;
      min-width: 44px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f2f4fa;
      color: #8b92b1;
      font-size: 12px;
      line-height: 1;
      text-align: center;
    }

    .footer-bar {
      position: absolute;
      left: 19px;
      right: 19px;
      bottom: 16px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-fade {
      position: absolute;
      left: 19px;
      right: 19px;
      bottom: 0;
      height: 154px;
      border-radius: 0 0 12px 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, #fff 42%, #fff 100%);
      pointer-events: none;
      z-index: 14;
    }

    .cta {
      width: 100%;
      min-height: 57px;
      border-radius: 12px;
      background: #1bc4bf;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      box-shadow: none;
    }

    .version {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      line-height: 1.4;
      color: #7a84a7;
      font-variant-numeric: tabular-nums;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(16, 24, 67, 0.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 80;
    }

    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .login-modal {
      width: min(100%, 332px);
      padding: 22px 20px 18px;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 24px 50px rgba(16, 24, 67, 0.22);
    }

    .login-modal h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
    }

    .login-modal p {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .login-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .login-action {
      flex: 1;
      min-height: 46px;
      border-radius: 999px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 600;
    }

    .login-action-secondary {
      background: #eef1ff;
      color: var(--text);
    }

    .login-action-primary {
      background: linear-gradient(180deg, var(--hero-start) 0%, var(--hero-end) 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(87, 104, 255, 0.28);
    }

    @media (max-width: 500px) {
      body {
        padding: 0;
        display: block;
        overflow: hidden;
        background: #fff;
      }

      .app-shell {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      .hero {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="app-scroll">
      <div class="scroll-content">
        <header class="nav">
          <div class="brand" aria-label="BAPLCP"></div>
          <div class="nav-title">本週臨打區</div>
          <button class="menu-btn" type="button" aria-label="開啟選單">
            <img src="https://www.figma.com/api/mcp/asset/ef5043d5-e26f-4bcc-ab7a-2a30efead619" alt="">
          </button>
        </header>

        <section class="hero">
          <div class="hero-layout">
            <div class="hero-cat" aria-hidden="true">
              <img src="./images/hero-cat.png" alt="">
            </div>
            <div class="hero-copy">
              <h1>本週臨打區</h1>
              <p>本週臨打報名及季打請假</p>
            </div>
          </div>
        </section>

        <section class="summary-card" aria-label="活動摘要">
          <div class="summary-main">
            <div class="summary-vacancy">
              <p class="summary-vacancy-label">臨打缺</p>
              <p class="summary-vacancy-value">2</p>
            </div>
            <div class="summary-info">
              <p class="summary-time">
                <span class="summary-date">12.31<span class="summary-weekday">（日）</span></span>
                <span class="summary-separator">|</span>
                <span>12:20-15:20</span>
              </p>
              <p class="summary-location">板橋柏吉倫排球場</p>
            </div>
          </div>
          <div class="summary-status">
            <p class="summary-status-text">
              我的狀態：<span class="summary-status-value">已報名季打</span>
            </p>
            <button class="leave-button" type="button">我要請假</button>
          </div>
        </section>

        <section class="content">
          <div class="segment-tabs" role="tablist" aria-label="名單分類">
            <button class="segment-tab is-active" type="button" role="tab" aria-selected="true">全部</button>
            <button class="segment-tab" type="button" role="tab" aria-selected="false">臨打</button>
            <button class="segment-tab" type="button" role="tab" aria-selected="false">季打</button>
          </div>
          <div class="list" id="signup-list"></div>
          <div class="version" id="app-version">v--</div>
        </section>
      </div>
    </div>

    <div class="footer-fade" aria-hidden="true"></div>
    <div class="footer-bar">
      <button class="cta" id="hero-cta" type="button">立即報名</button>
    </div>
  </main>

  <div class="modal-backdrop" id="login-modal" aria-hidden="true">
    <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <h3 id="login-modal-title">先用 LINE 驗證身分</h3>
      <p>V2 一樣沿用 LINE 身分驗證，避免重複報名，也方便後續直接帶入名稱與頭像。</p>
      <div class="login-actions">
        <button class="login-action login-action-secondary" id="modal-close" type="button">稍後再說</button>
        <button class="login-action login-action-primary" id="modal-login" type="button">立即登入</button>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    var APP_VERSION = "v2026.04.15-v2-04";
    var LIFF_ID = "2009808077-q6H0su3r";
    var MEMBERS = [
      { name: "Yu-Ting Chen", badge: "Y", image: "./images/profile01.png" },
      { name: "施政維", badge: "施", image: "./images/profile02.png" },
      { name: "莊則元", badge: "莊", image: "./images/profile03.png" },
      { name: "蔚", badge: "蔚", image: "./images/profile04.png" },
      { name: "乃瑄", badge: "乃", image: "./images/profile05.png" },
      { name: "莊辰豪", badge: "莊", image: "./images/profile06.png" },
      { name: "黃品諭", badge: "黃", image: "./images/profile07.png", status: "候補" },
      { name: "黃品翰", badge: "黃", color: "linear-gradient(135deg, #b59dc8 0%, #8468a0 100%)", status: "候補" }
    ];

    var TARGET_PAGE = new URL("./signup.html", window.location.href).href;
    var appScroll = document.querySelector(".app-scroll");
    var nav = document.querySelector(".nav");
    var appVersion = document.getElementById("app-version");
    var signupList = document.getElementById("signup-list");
    var heroCta = document.getElementById("hero-cta");
    var loginModal = document.getElementById("login-modal");
    var modalClose = document.getElementById("modal-close");
    var modalLogin = document.getElementById("modal-login");
    var liffReady = false;

    if (appVersion) {
      appVersion.textContent = APP_VERSION;
    }

    document.querySelectorAll(".segment-tab").forEach(function (tab) {
      tab.addEventListener("click", function () {
        document.querySelectorAll(".segment-tab").forEach(function (item) {
          var isActive = item === tab;
          item.classList.toggle("is-active", isActive);
          item.setAttribute("aria-selected", String(isActive));
        });
      });
    });

    if (signupList) {
      MEMBERS.forEach(function (member, index) {
        var row = document.createElement("div");
        row.className = "row";

        var rank = document.createElement("div");
        rank.className = "rank";
        rank.textContent = String(index + 1);

        var avatar = document.createElement("div");
        avatar.className = "avatar";

        if (member.image) {
          var avatarImage = document.createElement("img");
          avatarImage.src = member.image;
          avatarImage.alt = "";
          avatar.appendChild(avatarImage);
        } else {
          avatar.textContent = member.badge;
          avatar.style.background = member.color;
        }

        var name = document.createElement("div");
        name.className = "name";
        name.textContent = member.name;

        row.appendChild(rank);
        row.appendChild(avatar);
        row.appendChild(name);

        if (member.status) {
          var status = document.createElement("div");
          status.className = "status-tag";
          status.textContent = member.status;
          row.appendChild(status);
        }

        signupList.appendChild(row);
      });
    }

    function syncHeaderState() {
      if (!appScroll || !nav) return;
      var fadeDistance = 120;
      var progress = Math.max(0, Math.min(appScroll.scrollTop / fadeDistance, 1));
      nav.style.setProperty("--nav-progress", String(progress));
      nav.style.setProperty("--nav-bg-opacity", String(progress * 0.94));
      nav.classList.toggle("is-scrolled", progress > 0.55);
    }

    if (appScroll) {
      appScroll.addEventListener("scroll", syncHeaderState, { passive: true });
      syncHeaderState();
    }

    function setLoginModalOpen(isOpen) {
      if (!loginModal) return;
      loginModal.classList.toggle("is-open", isOpen);
      loginModal.setAttribute("aria-hidden", String(!isOpen));
    }

    async function initLiff() {
      if (!window.liff) return;

      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
      } catch (error) {
        console.error(error);
      }
    }

    if (heroCta) {
      heroCta.addEventListener("click", function () {
        if (!liffReady) {
          alert("LIFF 還在初始化，請稍後再試。");
          return;
        }

        if (!liff.isLoggedIn()) {
          setLoginModalOpen(true);
          return;
        }

        window.location.href = TARGET_PAGE;
      });
    }

    if (modalClose) {
      modalClose.addEventListener("click", function () {
        setLoginModalOpen(false);
      });
    }

    if (modalLogin) {
      modalLogin.addEventListener("click", function () {
        if (!window.liff || !liffReady) return;
        liff.login({ redirectUri: TARGET_PAGE });
      });
    }

    if (loginModal) {
      loginModal.addEventListener("click", function (event) {
        if (event.target === loginModal) {
          setLoginModalOpen(false);
        }
      });
    }

    initLiff();
  </script>
</body>
</html>

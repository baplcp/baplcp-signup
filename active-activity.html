<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>本週球局 | BAPLCP 排球報名系統</title>
  <meta name="description" content="BAPLCP 本週球局頁，提供臨打名額與名單檢視。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BAPLCP 排球報名系統">
  <meta property="og:title" content="BAPLCP 排球報名系統">
  <meta property="og:description" content="本週臨打報名、季打請假與活動資訊。">
  <meta property="og:url" content="https://baplcp.github.io/baplcp-signup/">
  <meta property="og:image" content="https://baplcp.github.io/baplcp-signup/images/link%20preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BAPLCP 排球報名系統">
  <meta name="twitter:description" content="本週臨打報名、季打請假與活動資訊。">
  <meta name="twitter:image" content="https://baplcp.github.io/baplcp-signup/images/link%20preview.png">
  <link rel="icon" type="image/png" sizes="1024x1024" href="./images/favicon.png?v=20260415">
  <link rel="shortcut icon" href="./images/favicon.png?v=20260415">
  <link rel="apple-touch-icon" href="./images/favicon.png?v=20260415">
  <script src="./js/prevent-zoom.js" defer></script>
  <style>
    :root {
      --bg: #eef1ff;
      --surface: #ffffff;
      --hero-start: #5768ff;
      --hero-end: #7685ff;
      --text: #18204f;
      --muted: #8a91b0;
      --accent: #ffd49d;
      --accent-text: #7f5a3e;
      --line: #edf0fb;
      --shadow: 0 24px 60px rgba(71, 82, 163, 0.18);
      --card-shadow: 2px 2px 28px rgba(90, 90, 226, 0.3);
    }

    * {
      box-sizing: border-box;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(87, 104, 255, 0.16), transparent 28%),
        linear-gradient(180deg, #f5f7ff 0%, #eef1ff 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      overflow: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      font: inherit;
      border: 0;
      padding: 0;
      background: none;
      cursor: pointer;
    }

    .app-shell {
      width: min(100%, 390px);
      height: min(844px, calc(100vh - 48px));
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .app-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .app-scroll::-webkit-scrollbar {
      display: none;
    }

    .scroll-content {
      min-height: 100%;
      background:
        linear-gradient(
          180deg,
          #5768ff 0%,
          #6373ff 7%,
          #7d8af9 13%,
          #c1c6f1 20%,
          #e8e9f5 27%,
          #fff 35%,
          #fff 100%
        );
    }

    .hero {
      position: relative;
      background: transparent;
      padding: 78px 16px 92px;
      min-height: 219px;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: none;
      pointer-events: none;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      margin: 0 0 -60px;
      min-height: 60px;
      background: rgba(255, 255, 255, var(--nav-bg-opacity, 0));
      backdrop-filter: blur(calc(var(--nav-progress, 0) * 14px));
      -webkit-backdrop-filter: blur(calc(var(--nav-progress, 0) * 14px));
      box-shadow: 0 1px 0 rgba(16, 24, 64, calc(var(--nav-progress, 0) * 0.08));
    }

    .back-btn {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      color: #fff;
      flex: 0 0 auto;
      transition: color 0.25s ease;
    }

    .back-btn svg {
      width: 24px;
      height: 24px;
    }

    .brand {
      width: 65px;
      height: 22px;
      background: url("./images/logo-white.svg") center/contain no-repeat;
      flex: 0 0 auto;
      transition: filter 0.25s ease;
    }

    .nav-title {
      flex: 1;
      opacity: 0;
      font-size: 15px;
      color: #fff;
      text-align: center;
    }

    .menu-btn {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .menu-btn img {
      width: 24px;
      height: 24px;
      transition: filter 0.25s ease;
    }

    .nav.is-scrolled {
      background: rgba(255, 255, 255, var(--nav-bg-opacity, 0.94));
    }

    .nav.is-scrolled .brand {
      background-image: url("./images/logo-purple.svg");
      filter: none;
    }

    .nav.is-scrolled .menu-btn img {
      filter: brightness(0) saturate(100%) invert(21%) sepia(27%) saturate(1897%) hue-rotate(210deg) brightness(93%) contrast(96%);
    }

    .nav.is-scrolled .back-btn {
      color: var(--text);
    }

    .hero-layout {
      position: relative;
      z-index: 1;
    }

    .hero-cat {
      position: absolute;
      right: 18px;
      bottom: 52px;
      width: 158px;
      height: auto;
      z-index: 1;
      pointer-events: none;
    }

    .hero-copy {
      position: relative;
      z-index: 2;
      color: #fff;
      padding-top: 0;
      transform: none;
      text-align: left;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.36;
      font-weight: 700;
      letter-spacing: 0.56px;
    }

    .summary-card {
      position: relative;
      z-index: 3;
      margin: -88px 16px 0;
      min-height: 107px;
      padding: 16px 16px 0;
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .summary-main {
      display: flex;
      align-items: center;
      gap: 17px;
      padding-bottom: 16px;
    }

    .summary-vacancy {
      width: 70px;
      min-height: 70px;
      flex: 0 0 auto;
      border-radius: 9px;
      background: rgba(220, 245, 245, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      text-align: center;
    }

    .summary-vacancy-label {
      margin: 0;
      font-size: 13px;
      line-height: 1.25;
      font-weight: 400;
      color: #474d66;
    }

    .summary-vacancy-value {
      margin: 0;
      font-size: 32px;
      line-height: 1.25;
      font-weight: 700;
      color: #17acba;
    }

    .summary-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .summary-time {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 700;
      color: #474d66;
      white-space: nowrap;
    }

    .summary-date {
      letter-spacing: 0;
      font-kerning: normal;
      font-feature-settings: "kern";
      margin-right: -2px;
    }

    .summary-weekday {
      display: inline-block;
      font-size: 13px;
      transform: translateX(-4px);
    }

    .summary-separator {
      display: inline-block;
      width: 1px;
      height: 18px;
      color: #d8dae5;
      background: currentColor;
      font-size: 0;
      line-height: 0;
      font-weight: 400;
      margin: 0 12px 0 2px;
    }

    .summary-location {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 400;
      color: #474d66;
      opacity: 0.85;
      white-space: nowrap;
    }

    .summary-status {
      margin: 0 -16px;
      padding: 16px 16px;
      border-top: 1px solid #edf0fb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .summary-status-text {
      margin: 0;
      min-width: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 400;
      color: #474d66;
      white-space: nowrap;
    }

    .summary-status-value {
      color: #8f95b2;
      font-weight: 400;
    }

    .summary-status-value.is-success {
      color: #17acba;
    }

    .summary-fee {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 8px;
      color: #474d66;
      white-space: nowrap;
    }

    .summary-fee-money {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      margin-right: -10px;
    }

    .summary-fee-air {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      margin-right: -4px;
    }

    .summary-fee-amount {
      font-size: 15px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0;
      margin-right: -4px;
    }

    .summary-fee-state {
      font-size: 15px;
      line-height: 1.25;
      font-weight: 400;
    }

    .summary-fee-state[hidden] {
      display: none;
    }

    .leave-button {
      min-width: 0;
      min-height: 0;
      padding: 7px 14px;
      border: 1px solid #e3e6ef;
      border-radius: 999px;
      background: #fff;
      color: #474d66;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 400;
    }

    .content {
      padding: 24px 16px 110px;
    }

    .segment-tabs {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
    }

    .segment-tab {
      min-width: 56px;
      min-height: 34px;
      padding: 6px 17px;
      border-radius: 999px;
      background: #edeff5;
      color: #8d94ad;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .segment-tab.is-active {
      background: var(--hero-start);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(87, 104, 255, 0.22);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 2px;
    }

    .rank {
      width: 18px;
      flex: 0 0 auto;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--hero-start);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      background: linear-gradient(135deg, #8aa0ff 0%, #5768ff 100%);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .status-tag {
      flex: 0 0 auto;
      min-width: 44px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f2f4fa;
      color: #8b92b1;
      font-size: 12px;
      line-height: 1;
      text-align: center;
    }

    .footer-bar {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-fade {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 0;
      height: 154px;
      border-radius: 0 0 12px 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, #fff 42%, #fff 100%);
      pointer-events: none;
      z-index: 14;
    }

    .cta {
      width: 100%;
      min-height: 57px;
      border-radius: 12px;
      background: #1bc4bf;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      box-shadow: none;
    }

    .signup-overlay {
      position: absolute;
      inset: 0;
      z-index: 38;
      pointer-events: none;
    }

    .signup-overlay.is-open {
      pointer-events: auto;
    }

    .signup-backdrop {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .signup-overlay.is-open .signup-backdrop {
      opacity: 1;
    }

    .signup-sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(422px, calc(100% - 48px));
      border-radius: 16px 16px 0 0;
      background: #fff;
      color: #101840;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .signup-overlay.is-open .signup-sheet {
      transform: translateY(0);
    }

    .signup-sheet-header {
      flex: 0 0 auto;
      min-height: 74px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 30px 20px 16px;
    }

    .signup-sheet-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.4;
      font-weight: 600;
      color: #101840;
      white-space: nowrap;
    }

    .prefill-tag {
      margin-top: 2px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #f7f8fe;
      color: #5768ff;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 500;
      white-space: nowrap;
    }

    .signup-close {
      width: 24px;
      height: 24px;
      margin-left: auto;
      display: grid;
      place-items: center;
      color: #474d66;
      flex: 0 0 auto;
    }

    .signup-close svg {
      width: 24px;
      height: 24px;
    }

    .signup-sheet-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 20px 18px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .signup-sheet-scroll::-webkit-scrollbar {
      display: none;
    }

    .signup-controls {
      display: grid;
      gap: 12px;
    }

    .signup-field-card {
      width: 100%;
      border: 1px solid #edeff5;
      border-radius: 12px;
      background: #fff;
      padding: 13px 17px;
    }

    .signup-field-card.is-stack {
      display: grid;
      gap: 12px;
    }

    .signup-field-row {
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .signup-field-label {
      min-width: 0;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 500;
      color: #101840;
    }

    .signup-stepper {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 0 0 auto;
    }

    .stepper-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #5768ff;
      color: #fff;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .stepper-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    .stepper-btn:disabled {
      background: #d8dae5;
      cursor: default;
    }

    .stepper-btn svg {
      width: 14px;
      height: 14px;
    }

    .stepper-value {
      width: 12px;
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
      text-align: center;
      color: #393939;
      font-variant-numeric: tabular-nums;
    }

    .guest-fields {
      display: grid;
      gap: 9px;
    }

    .guest-fields:empty {
      display: none;
    }

    .guest-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 9px;
    }

    .guest-input,
    .guest-select {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(86, 103, 137, 0.2);
      border-radius: 8px;
      background: #fff;
      color: #101840;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      padding: 10px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .guest-input:focus,
    .guest-select:focus {
      border-color: rgba(87, 104, 255, 0.72);
      box-shadow: 0 0 0 3px rgba(87, 104, 255, 0.12);
    }

    .guest-select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #696f8c 50%), linear-gradient(135deg, #696f8c 50%, transparent 50%);
      background-position: calc(100% - 18px) 18px, calc(100% - 13px) 18px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 32px;
    }

    .guest-input::placeholder,
    .guest-select:invalid {
      color: #8f95b2;
    }

    .signup-count {
      margin: 0 0 13px;
      color: #5768ff;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 500;
      text-align: center;
    }

    .signup-sheet-footer {
      flex: 0 0 auto;
      padding: 0 22px 21px;
      background: #fff;
    }

    .confirm-signup {
      width: 100%;
      min-height: 48px;
      border-radius: 10px;
      background: #5768ff;
      color: #fff;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 600;
    }

    .confirm-signup:disabled {
      background: #d8dae5;
      cursor: default;
    }

    .signup-note {
      margin: 13px 0 0;
      color: #696f8c;
      font-size: 13px;
      line-height: 1.25;
      text-align: center;
    }

    .success-dialog-overlay {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease;
    }

    .success-dialog-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .success-dialog {
      width: min(100%, 318px);
      border-radius: 16px;
      background: #fff;
      padding: 28px 22px 22px;
      box-shadow: 0 22px 52px rgba(16, 24, 64, 0.2);
      text-align: center;
      transform: translateY(10px) scale(0.98);
      transition: transform 0.24s ease;
    }

    .success-dialog-overlay.is-open .success-dialog {
      transform: translateY(0) scale(1);
    }

    .success-dialog-title {
      margin: 0;
      color: #101840;
      font-size: 20px;
      line-height: 1.4;
      font-weight: 600;
    }

    .success-dialog-copy {
      margin: 12px 0 24px;
      color: #474d66;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 400;
    }

    .success-dialog-button {
      width: 100%;
      min-height: 48px;
      border-radius: 10px;
      background: #5768ff;
      color: #fff;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 600;
    }

    .version {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      line-height: 1.4;
      color: #7a84a7;
      font-variant-numeric: tabular-nums;
    }

    .menu-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      pointer-events: none;
    }

    .menu-overlay.is-open {
      pointer-events: auto;
    }

    .menu-backdrop {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .menu-overlay.is-open .menu-backdrop {
      opacity: 1;
    }

    .side-menu {
      position: absolute;
      top: 0;
      right: 0;
      width: min(329px, calc(100% - 61px));
      height: 100%;
      padding: 32px 0;
      background: #fff;
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .side-menu::-webkit-scrollbar {
      display: none;
    }

    .menu-overlay.is-open .side-menu {
      transform: translateX(0);
    }

    .drawer-profile {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px 28px;
    }

    .drawer-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .drawer-user-stack {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .drawer-user {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;

    }

    .drawer-role {
      width: max-content;

      align-items: center;

      gap: 4px;
      padding: 4px 6px;

    .drawer-close {
      width: 24px;
      height: 24px;

    .drawer-content {

    .drawer-section {

    .drawer-section-title {

    .drawer-list {

    .drawer-link {

    .drawer-link.is-pending {

    .drawer-icon {
      width: 36px;

      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: #a8b1f4;

    }

    .drawer-icon img {
      width: 32px;

      object-fit: contain;
      filter: drop-shadow(3.2px 3.2px 12px rgba(87, 104, 255, 0.55));
    }

    .drawer-icon.is-warm {

    .drawer-icon.is-warm img {
      filter: drop-shadow(3.8px 3.8px 14px rgba(148, 77, 27, 0.45));
    }

    .drawer-icon.is-muted {
      background: #edeff5;
    }

    .drawer-divider {
      height: 1px;
      background: #edeff5;
    }

    .drawer-footer {
      margin-top: auto;
      padding: 0 16px;
    }

    .drawer-create-button {
      width: 100%;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #1BC4BF;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 500;
    }

    @media (max-width: 380px) {
      .side-menu {
        width: 84vw;
      }

      .drawer-section {
        padding-right: 24px;
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 0;

        overflow: hidden;
        background: #fff;
      }

      .app-shell {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      .hero {
        border-radius: 0;
      }
    }
  </style>
</head>

              <p class="summary-time">

              <img class="summary-fee-money" src="./images/money-icon.png" alt="" aria-hidden="true">
              <img class="summary-fee-air" src="./images/airconditioner-icon.png" alt="" aria-hidden="true">
              <span class="summary-fee-amount">$255</span>
              <span class="summary-fee-state" hidden>未付</span>
            </div>
          </div>
        </section>

        <section class="content">
          <div class="segment-tabs" role="tablist" aria-label="名單分類">
            <button class="segment-tab is-active" type="button" role="tab" aria-selected="true">全部</button>
            <button class="segment-tab" type="button" role="tab" aria-selected="false">臨打</button>

            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

        <div class="signup-sheet-scroll">

                  <button class="stepper-btn" type="button" data-step="up" aria-label="增加我的報名人數">

              <div class="signup-field-row">
                <div class="signup-field-label">群外</div>

                  <button class="stepper-btn" type="button" data-step="down" aria-label="減少群外報名人數">
                    <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
                      <path d="M3 7H11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                  </button>
                  <output class="stepper-value" id="guest-count">0</output>
                  <button class="stepper-btn" type="button" data-step="up" aria-label="增加群外報名人數">
                    <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
                      <path d="M7 3V11M3 7H11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                  </button>

          <p class="signup-note">送出不代表報名成功，請以名單為準</p>

    <div class="success-dialog-overlay" id="success-dialog-overlay" aria-hidden="true" inert>
      <section class="success-dialog" role="dialog" aria-modal="true" aria-labelledby="success-dialog-title">
        <h2 class="success-dialog-title" id="success-dialog-title">報名已送出</h2>
        <p class="success-dialog-copy" id="success-dialog-copy">已送出報名 0 位，請稍候確認名單是否成功加入</p>
        <button class="success-dialog-button" id="success-dialog-button" type="button">確認</button>
      </section>
    </div>
  </main>

  <script src="./js/menu-drawer.js"></script>
  <script>
    var APP_VERSION = "v2026.04.18-active-drawer-04";
    var MEMBERS = [
      { name: "莊則元", badge: "莊", image: "./images/profile01.png" },
      { name: "施政維", badge: "施", image: "./images/profile02.png" },
      { name: "莊宸豪", badge: "莊", image: "./images/profile03.png" },
      { name: "蔚", badge: "蔚", image: "./images/profile04.png" },
      { name: "乃瑄", badge: "乃", image: "./images/profile05.png" },
      { name: "莊辰豪", badge: "莊", image: "./images/profile06.png" },
      { name: "黃品諭", badge: "黃", image: "./images/profile07.png", status: "候補" },
      { name: "黃品翰", badge: "黃", color: "linear-gradient(135deg, #b59dc8 0%, #8468a0 100%)", status: "候補" }
    ];

    var appScroll = document.querySelector(".app-scroll");
    var nav = document.querySelector(".nav");
    var backButton = document.getElementById("back-button");
    var appVersion = document.getElementById("app-version");
    var signupList = document.getElementById("signup-list");
    var heroCta = document.getElementById("hero-cta");
    var summaryStatusValue = document.querySelector(".summary-status-value");
    var summaryFee = document.querySelector(".summary-fee");
    var summaryFeeAmount = document.querySelector(".summary-fee-amount");
    var summaryFeeState = document.querySelector(".summary-fee-state");
    var appShell = document.querySelector(".app-shell");
    var signupOverlay = document.getElementById("signup-overlay");
    var signupCloseTargets = document.querySelectorAll("[data-signup-close]");
    var selfCountOutput = document.getElementById("self-count");
    var guestCountOutput = document.getElementById("guest-count");
    var guestFields = document.getElementById("guest-fields");
    var signupTotal = document.getElementById("signup-total");
    var confirmSignup = document.getElementById("confirm-signup");
    var successDialogOverlay = document.getElementById("success-dialog-overlay");
    var successDialogTitle = document.getElementById("success-dialog-title");
    var successDialogCopy = document.getElementById("success-dialog-copy");
    var successDialogButton = document.getElementById("success-dialog-button");
    var signupState = {
      self: 0,
      guest: 0,
      guests: []
    };
    var submittedSignupState = cloneSignupState(signupState);

    if (appVersion) {
      appVersion.textContent = APP_VERSION;
    }

    function updateSignupSummary(total) {
      var hasSignup = total > 0;
      var fee = hasSignup ? total * 255 : 255;

      if (summaryStatusValue) {
        summaryStatusValue.textContent = hasSignup ? "已成功報名 " + String(total) + " 位" : "無報名";
        summaryStatusValue.classList.toggle("is-success", hasSignup);
      }

      if (summaryFeeAmount) {
        summaryFeeAmount.textContent = "$" + String(fee);
      }

      if (summaryFeeState) {
        summaryFeeState.hidden = !hasSignup;
      }

      if (summaryFee) {
        summaryFee.setAttribute("aria-label", hasSignup ? "費用 " + String(fee) + " 元，未付" : "費用 255 元");
      }

      if (heroCta) {
        heroCta.textContent = hasSignup ? "管理報名" : "我要報名";
      }
    }

    function cloneSignupState(state) {
      return {
        self: state.self,
        guest: state.guest,
        guests: state.guests.map(function (guest) {
          return {
            name: guest && guest.name ? guest.name : "",
            gender: guest && guest.gender ? guest.gender : ""
          };
        })
      };
    }

    function isSignupChanged() {
      if (signupState.self !== submittedSignupState.self || signupState.guest !== submittedSignupState.guest) {
        return true;
      }

      for (var index = 0; index < signupState.guest; index += 1) {
        var currentGuest = signupState.guests[index] || { name: "", gender: "" };
        var submittedGuest = submittedSignupState.guests[index] || { name: "", gender: "" };

        if ((currentGuest.name || "") !== (submittedGuest.name || "") || (currentGuest.gender || "") !== (submittedGuest.gender || "")) {
          return true;
        }
      }

      return false;
    }

    function updateConfirmSignupState() {
      if (confirmSignup) {
        confirmSignup.disabled = !isSignupChanged();
      }
    }

    document.querySelectorAll(".segment-tab").forEach(function (tab) {
      tab.addEventListener("click", function () {
        document.querySelectorAll(".segment-tab").forEach(function (item) {
          var isActive = item === tab;
          item.classList.toggle("is-active", isActive);
          item.setAttribute("aria-selected", String(isActive));
        });
      });
    });

    if (signupList) {
      MEMBERS.forEach(function (member, index) {
        var row = document.createElement("div");
        row.className = "row";

        var rank = document.createElement("div");
        rank.className = "rank";
        rank.textContent = String(index + 1);

        var avatar = document.createElement("div");
        avatar.className = "avatar";

        if (member.image) {
          var avatarImage = document.createElement("img");
          avatarImage.src = member.image;
          avatarImage.alt = "";
          avatar.appendChild(avatarImage);
        } else {
          avatar.textContent = member.badge;
          avatar.style.background = member.color;
        }

        var name = document.createElement("div");
        name.className = "name";
        name.textContent = member.name;

        row.appendChild(rank);
        row.appendChild(avatar);
        row.appendChild(name);

        if (member.status) {
          var status = document.createElement("div");
          status.className = "status-tag";
          status.textContent = member.status;
          row.appendChild(status);
        }

        signupList.appendChild(row);
      });
    }

    function syncHeaderState() {
      if (!appScroll || !nav) return;
      var fadeDistance = 120;
      var progress = Math.max(0, Math.min(appScroll.scrollTop / fadeDistance, 1));
      nav.style.setProperty("--nav-progress", String(progress));
      nav.style.setProperty("--nav-bg-opacity", String(progress * 0.94));
      nav.classList.toggle("is-scrolled", progress > 0.55);
    }

    if (appScroll) {
      appScroll.addEventListener("scroll", syncHeaderState, { passive: true });
      syncHeaderState();
    }

    updateSignupSummary(0);

    if (backButton) {
      backButton.addEventListener("click", function () {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }

        window.location.href = "./index.html";
      });
    }

    function renderGuestFields() {
      if (!guestFields) return;

      guestFields.innerHTML = "";

      for (var index = 0; index < signupState.guest; index += 1) {
        var guestData = signupState.guests[index] || { name: "", gender: "" };
        var row = document.createElement("div");
        row.className = "guest-row";

        var nameInput = document.createElement("input");
        nameInput.className = "guest-input";
        nameInput.type = "text";
        nameInput.name = "guest-name-" + String(index + 1);
        nameInput.placeholder = "群外朋友姓名";
        nameInput.value = guestData.name;
        nameInput.setAttribute("aria-label", "第 " + String(index + 1) + " 位群外朋友姓名");
        nameInput.addEventListener("input", function (event) {
          var guestIndex = Number(event.target.getAttribute("data-guest-index"));
          signupState.guests[guestIndex] = signupState.guests[guestIndex] || { name: "", gender: "" };
          signupState.guests[guestIndex].name = event.target.value;
          updateConfirmSignupState();
        });
        nameInput.setAttribute("data-guest-index", String(index));

        var genderSelect = document.createElement("select");
        genderSelect.className = "guest-select";
        genderSelect.name = "guest-gender-" + String(index + 1);
        genderSelect.required = true;
        genderSelect.setAttribute("aria-label", "第 " + String(index + 1) + " 位群外朋友性別");
        genderSelect.setAttribute("data-guest-index", String(index));
        genderSelect.addEventListener("change", function (event) {
          var guestIndex = Number(event.target.getAttribute("data-guest-index"));
          signupState.guests[guestIndex] = signupState.guests[guestIndex] || { name: "", gender: "" };
          signupState.guests[guestIndex].gender = event.target.value;
          updateConfirmSignupState();
        });

        [
          { value: "", label: "性別" },
          { value: "female", label: "女" },
          { value: "male", label: "男" },
          { value: "other", label: "其他" }
        ].forEach(function (optionData) {
          var option = document.createElement("option");
          option.value = optionData.value;
          option.textContent = optionData.label;
          if (!optionData.value) {
            option.disabled = true;
            option.selected = !guestData.gender;
          } else if (optionData.value === guestData.gender) {
            option.selected = true;
          }
          genderSelect.appendChild(option);
        });

        row.appendChild(nameInput);
        row.appendChild(genderSelect);
        guestFields.appendChild(row);
      }
    }

    function renderSignupSheet() {
      var total = signupState.self + signupState.guest;

      if (selfCountOutput) selfCountOutput.textContent = String(signupState.self);
      if (guestCountOutput) guestCountOutput.textContent = String(signupState.guest);
      if (signupTotal) signupTotal.textContent = "共報名 " + String(total) + " 位";

      document.querySelectorAll("[data-stepper]").forEach(function (stepper) {
        var type = stepper.getAttribute("data-stepper");
        var value = signupState[type];
        var max = type === "self" ? 1 : 6;
        var down = stepper.querySelector('[data-step="down"]');
        var up = stepper.querySelector('[data-step="up"]');

        if (down) down.disabled = value <= 0;
        if (up) up.disabled = value >= max;
      });

      renderGuestFields();
      updateConfirmSignupState();
    }

    function setSignupOpen(isOpen) {
      if (!signupOverlay) return;

      signupOverlay.classList.toggle("is-open", isOpen);
      signupOverlay.setAttribute("aria-hidden", String(!isOpen));
      signupOverlay.inert = !isOpen;
      if (appShell) appShell.classList.toggle("signup-open", isOpen);

      var focusTarget = isOpen ? signupOverlay.querySelector(".signup-close") : heroCta;
      if (focusTarget) {
        focusTarget.focus({ preventScroll: true });
      }
    }

    function setSuccessDialogOpen(isOpen, options) {
      if (!successDialogOverlay) return;

      if (options) {
        if (successDialogTitle && options.title) {
          successDialogTitle.textContent = options.title;
        }

        if (successDialogCopy && options.copy) {
          successDialogCopy.textContent = options.copy;
        }

        if (successDialogButton && options.buttonText) {
          successDialogButton.textContent = options.buttonText;
        }
      }

      successDialogOverlay.classList.toggle("is-open", isOpen);
      successDialogOverlay.setAttribute("aria-hidden", String(!isOpen));
      successDialogOverlay.inert = !isOpen;

      var focusTarget = isOpen ? successDialogButton : (signupOverlay && signupOverlay.classList.contains("is-open") ? confirmSignup : heroCta);
      if (focusTarget) {
        focusTarget.focus({ preventScroll: true });
      }
    }

    document.querySelectorAll("[data-stepper] [data-step]").forEach(function (button) {
      button.addEventListener("click", function () {
        var stepper = button.closest("[data-stepper]");
        var type = stepper ? stepper.getAttribute("data-stepper") : "";
        var direction = button.getAttribute("data-step") === "up" ? 1 : -1;
        var max = type === "self" ? 1 : 6;

        if (!type) return;

        signupState[type] = Math.max(0, Math.min(max, signupState[type] + direction));
        signupState.guests = signupState.guests.slice(0, signupState.guest);
        renderSignupSheet();
      });
    });

    signupCloseTargets.forEach(function (target) {
      target.addEventListener("click", function () {
        setSignupOpen(false);
      });
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && signupOverlay && signupOverlay.classList.contains("is-open")) {
        setSignupOpen(false);
      } else if (event.key === "Escape" && successDialogOverlay && successDialogOverlay.classList.contains("is-open")) {
        setSuccessDialogOpen(false);
      }
    });

    if (confirmSignup) {
      confirmSignup.addEventListener("click", function () {
        if (confirmSignup.disabled) return;

        var total = signupState.self + signupState.guest;
        var previousTotal = submittedSignupState.self + submittedSignupState.guest;
        var isUpdatingExistingSignup = previousTotal > 0;

        if (total <= 0 && previousTotal <= 0) {
          setSuccessDialogOpen(true, {
            title: "還沒有選擇人數",
            copy: "目前沒有任何人被加入報名，請先選擇「我」或「群外」人數後再送出。",
            buttonText: "回去選人"
          });
          return;
        }

        updateSignupSummary(total);
        submittedSignupState = cloneSignupState(signupState);
        renderSignupSheet();
        setSignupOpen(false);
        setSuccessDialogOpen(true, {
          title: isUpdatingExistingSignup || total <= 0 ? "報名已更新" : "報名已送出",
          copy: total > 0
            ? (isUpdatingExistingSignup ? "已更新報名 " : "已送出報名 ") + String(total) + " 位，請稍候確認名單是否成功加入"
            : "已更新為無報名，請稍候確認名單是否同步完成",
          buttonText: "確認"
        });
      });
    }

    if (successDialogButton) {
      successDialogButton.addEventListener("click", function () {
        setSuccessDialogOpen(false);
      });
    }

    if (heroCta) {
      heroCta.addEventListener("click", function () {
        setSignupOpen(true);
      });
    }

    renderSignupSheet();
  </script>
</body>
</html>
